<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — SecureShop</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">⚙️ Admin Panel</div>
    <nav>
      <a href="#" class="active" onclick="showTab('dashboard')">📊 Dashboard</a>
      <a href="#" onclick="showTab('orders')">📦 Orders</a>
      <a href="#" onclick="showTab('products')">🛍️ Products</a>
      <a href="#" onclick="showTab('users')">👥 Users</a>
      <a href="/" onclick="">🏠 Back to Store</a>
      <a href="#" onclick="logout()" style="color:#e94560;margin-top:auto;">🚪 Logout</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <h2 style="margin-bottom:8px;" id="tab-title">Dashboard</h2>
    <p style="color:#999;margin-bottom:28px;" id="tab-sub">Welcome back, <strong id="admin-name"></strong></p>

    <!-- Dashboard Tab -->
    <div id="tab-dashboard">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-value" id="stat-orders">—</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-revenue">—</div><div class="stat-label">Total Revenue</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-products">—</div><div class="stat-label">Products</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-users">—</div><div class="stat-label">Registered Users</div></div>
      </div>
      <div class="card-box">
        <h3>Recent Orders</h3>
        <div id="recent-orders"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Orders Tab -->
    <div id="tab-orders" class="hidden">
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr><th>#</th><th>Customer</th><th>Amount</th><th>Date</th><th>Status</th><th>Update</th></tr></thead>
          <tbody id="orders-body"><tr><td colspan="6" style="text-align:center;padding:24px;"><div class="spinner" style="margin:0 auto;width:28px;height:28px;"></div></td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Products Tab -->
    <div id="tab-products" class="hidden">
      <div class="card-box" style="margin-bottom:24px;">
        <h3>Add New Product</h3>
        <div class="form-row">
          <div class="form-group"><label>Name</label><input type="text" id="p-name" placeholder="Product name"/></div>
          <div class="form-group"><label>Category</label>
            <select id="p-cat" style="width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;">
              <option>Smartphones</option><option>Laptops</option>
              <option>Headphones</option><option>Smartwatches</option><option>Tablets</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Description</label><input type="text" id="p-desc" placeholder="Short description"/></div>
        <div class="form-row">
          <div class="form-group"><label>Price ($)</label><input type="number" id="p-price" placeholder="999.99" step="0.01"/></div>
          <div class="form-group"><label>Stock</label><input type="number" id="p-stock" placeholder="50"/></div>
        </div>
        <div class="form-group"><label>Image URL</label><input type="url" id="p-img" placeholder="https://…"/></div>
        <button class="btn-primary" style="max-width:200px;" onclick="addProduct()">Add Product</button>
        <div id="p-alert" class="alert" style="margin-top:12px;max-width:400px;"></div>
      </div>

      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Delete</th></tr></thead>
          <tbody id="products-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="hidden">
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
          <tbody id="users-body"><tr><td colspan="5" style="text-align:center;padding:24px;">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="/js/cart.js"></script>
<script src="/js/api.js"></script>
<script>
  if (!isLoggedIn() || !isAdmin()) window.location.href = "/pages/login.html";

  const user = getUser();
  if (user) document.getElementById("admin-name").textContent = user.name;

  let currentTab = "dashboard";

  function showTab(tab) {
    ["dashboard","orders","products","users"].forEach(t => {
      document.getElementById(`tab-${t}`).classList.add("hidden");
    });
    document.getElementById(`tab-${tab}`).classList.remove("hidden");
    const titles = { dashboard:"Dashboard", orders:"Orders", products:"Products", users:"Users" };
    document.getElementById("tab-title").textContent = titles[tab];
    currentTab = tab;

    // Lazy load data per tab
    if (tab === "orders")   loadOrders();
    if (tab === "products") loadProducts();
    if (tab === "users")    loadUsers();
  }

  // ── Dashboard ────────────────────────────────────────────
  async function loadDashboard() {
    try {
      const [ordersRes, productsRes, usersRes] = await Promise.all([
        authFetch("/api/admin/orders"),
        fetch("/api/products"),
        authFetch("/api/admin/users"),
      ]);
      const orders   = await ordersRes.json();
      const products = await productsRes.json();
      const users    = await usersRes.json();

      const revenue = orders.reduce((s, o) => s + parseFloat(o.total_amount), 0);
      document.getElementById("stat-orders").textContent   = orders.length;
      document.getElementById("stat-revenue").textContent  = `$${revenue.toFixed(0)}`;
      document.getElementById("stat-products").textContent = products.length;
      document.getElementById("stat-users").textContent    = users.length;

      const recent = orders.slice(0, 5);
      document.getElementById("recent-orders").innerHTML = recent.length
        ? `<table class="data-table" style="margin-top:16px;">
            <thead><tr><th>#</th><th>Customer</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody>${recent.map(o => `
              <tr>
                <td>#${o.id}</td>
                <td>${o.customer}</td>
                <td>$${parseFloat(o.total_amount).toFixed(2)}</td>
                <td><span class="badge badge-${o.status}">${o.status}</span></td>
              </tr>`).join("")}
            </tbody></table>`
        : '<p style="color:#999;padding:16px 0;">No orders yet.</p>';
    } catch { console.error("Dashboard load failed"); }
  }

  // ── Orders ───────────────────────────────────────────────
  async function loadOrders() {
    const tbody = document.getElementById("orders-body");
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px;"><div class="spinner" style="margin:0 auto;width:28px;height:28px;"></div></td></tr>`;
    const res    = await authFetch("/api/admin/orders");
    const orders = await res.json();
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td>#${o.id}</td>
        <td>${o.customer}<br/><small style="color:#999;">${o.email}</small></td>
        <td>$${parseFloat(o.total_amount).toFixed(2)}</td>
        <td>${new Date(o.created_at).toLocaleDateString()}</td>
        <td><span class="badge badge-${o.status}">${o.status}</span></td>
        <td>
          <select class="status-select" onchange="updateStatus(${o.id}, this.value)">
            ${["pending","paid","shipped","delivered","cancelled"].map(s =>
              `<option value="${s}" ${s===o.status?"selected":""}>${s}</option>`).join("")}
          </select>
        </td>
      </tr>`).join("");
  }

  async function updateStatus(id, status) {
    await authFetch(`/api/admin/orders/${id}/status`, {
      method: "PATCH", body: JSON.stringify({ status })
    });
    showToast(`Order #${id} updated to "${status}"`);
  }

  // ── Products ─────────────────────────────────────────────
  async function loadProducts() {
    const res  = await fetch("/api/products");
    const data = await res.json();
    document.getElementById("products-body").innerHTML = data.map(p => `
      <tr>
        <td>#${p.id}</td>
        <td>${p.name}</td>
        <td>${p.category}</td>
        <td>$${parseFloat(p.price).toFixed(2)}</td>
        <td>${p.stock}</td>
        <td><button class="btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button></td>
      </tr>`).join("");
  }

  async function addProduct() {
    const body = {
      name:      document.getElementById("p-name").value.trim(),
      category:  document.getElementById("p-cat").value,
      description: document.getElementById("p-desc").value.trim(),
      price:     document.getElementById("p-price").value,
      stock:     document.getElementById("p-stock").value,
      image_url: document.getElementById("p-img").value.trim(),
    };
    if (!body.name || !body.price) {
      const al = document.getElementById("p-alert");
      al.className = "alert alert-error"; al.style.display = "block";
      al.textContent = "Name and price are required."; return;
    }
    const res  = await authFetch("/api/admin/products", { method:"POST", body: JSON.stringify(body) });
    const data = await res.json();
    if (data.productId) { showToast("Product added!"); loadProducts(); }
  }

  async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;
    await authFetch(`/api/admin/products/${id}`, { method: "DELETE" });
    showToast("Product deleted");
    loadProducts();
  }

  // ── Users ────────────────────────────────────────────────
  async function loadUsers() {
    const res   = await authFetch("/api/admin/users");
    const users = await res.json();
    document.getElementById("users-body").innerHTML = users.map(u => `
      <tr>
        <td>#${u.id}</td>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td><span class="badge ${u.role==='admin'?'badge-paid':'badge-pending'}">${u.role}</span></td>
        <td>${new Date(u.created_at).toLocaleDateString()}</td>
      </tr>`).join("");
  }

  // Init
  loadDashboard();
</script>
</body>
</html>
