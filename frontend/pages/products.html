<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — SecureShop</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div id="navbar"></div>

  <section class="section">
    <div class="container">
      <h2 class="section-title">All Products</h2>
      <p class="section-subtitle">Browse our full range of electronics</p>

      <!-- Filters -->
      <div class="filter-bar">
        <input type="text" id="search" placeholder="🔍 Search products…" oninput="filterProducts()"/>
        <select id="category" onchange="filterProducts()">
          <option value="">All Categories</option>
          <option value="Smartphones">Smartphones</option>
          <option value="Laptops">Laptops</option>
          <option value="Headphones">Headphones</option>
          <option value="Smartwatches">Smartwatches</option>
          <option value="Tablets">Tablets</option>
        </select>
        <select id="sort" onchange="filterProducts()">
          <option value="">Sort By</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>

      <div class="product-grid" id="product-grid">
        <div class="spinner"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2025 <span>SecureShop</span> — All rights reserved</p>
  </footer>

  <script src="/js/cart.js"></script>
  <script src="/js/api.js"></script>
  <script>
    let allProducts = [];

    renderNavbar();

    async function loadProducts() {
      try {
        const res  = await fetch("/api/products");
        allProducts = await res.json();
        renderGrid(allProducts);
      } catch {
        document.getElementById("product-grid").innerHTML =
          '<p style="color:red">Failed to load products. Make sure the server is running.</p>';
      }
    }

    function filterProducts() {
      const search   = document.getElementById("search").value.toLowerCase();
      const category = document.getElementById("category").value;
      const sort     = document.getElementById("sort").value;

      let filtered = allProducts.filter(p => {
        const matchSearch   = p.name.toLowerCase().includes(search) || (p.description||"").toLowerCase().includes(search);
        const matchCategory = !category || p.category === category;
        return matchSearch && matchCategory;
      });

      if (sort === "price-asc")  filtered.sort((a,b) => a.price - b.price);
      if (sort === "price-desc") filtered.sort((a,b) => b.price - a.price);
      if (sort === "name")       filtered.sort((a,b) => a.name.localeCompare(b.name));

      renderGrid(filtered);
    }

    function renderGrid(products) {
      const grid = document.getElementById("product-grid");
      if (!products.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><p>No products found.</p></div>`;
        return;
      }
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <img src="${p.image_url || 'https://via.placeholder.com/400x200?text=No+Image'}"
               alt="${p.name}" loading="lazy"/>
          <div class="card-body">
            <span class="category">${p.category || "General"}</span>
            <h3>${p.name}</h3>
            <p style="color:#777;font-size:.85rem;margin:6px 0 12px;min-height:40px;">
              ${p.description ? p.description.slice(0,80)+"…" : ""}
            </p>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span class="price">$${parseFloat(p.price).toFixed(2)}</span>
              <span style="font-size:.8rem;color:${p.stock > 5 ? '#28a745' : '#ffc107'};">
                ${p.stock > 5 ? `In Stock (${p.stock})` : p.stock > 0 ? `Only ${p.stock} left!` : "Out of Stock"}
              </span>
            </div>
            <button class="btn-add" ${p.stock === 0 ? "disabled" : ""}
              onclick="addToCart({id:${p.id},name:'${p.name.replace(/'/g,"\\'")}',price:${p.price},image_url:'${p.image_url||''}'})"
            >
              ${p.stock === 0 ? "Out of Stock" : "🛒 Add to Cart"}
            </button>
          </div>
        </div>`).join("");
    }

    loadProducts();
  </script>
</body>
</html>
